name: Node.js CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      # This flag allows the build to continue even with older template dependencies
      run: npm install --legacy-peer-deps

    - name: Build Project
      # Setting CI: false prevents warnings from being treated as fatal errors
      run: npm run build
      env:
        CI: false

    - name: Deploy to GitHub Pages
      # This is the magic step that creates the "gh-pages" branch for you
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: build
