name: Node.js CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18 # Using 18 is more stable for this older template
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install and Build
      run: |
        npm install --legacy-peer-deps
        npm run build --if-present
      env:
        CI: false
